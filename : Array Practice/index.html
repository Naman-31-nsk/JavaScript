<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Array Practice</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-6 rounded-xl shadow-lg w-96 text-center">
    <h1 class="text-2xl font-bold mb-4">Array Practice</h1>

    <p id="original" class="mb-2 text-gray-700"></p>
    <p id="result" class="mb-4 text-blue-600 font-semibold"></p>

    <button id="doubleBtn" class="bg-blue-500 text-white px-4 py-2 rounded m-1 hover:bg-blue-600">
      Double Values
    </button>

    <button id="evenBtn" class="bg-green-500 text-white px-4 py-2 rounded m-1 hover:bg-green-600">
      Even Numbers
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
